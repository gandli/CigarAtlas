#:schema node_modules/wrangler/config-schema.json
# Production environment configuration
# Use: wrangler deploy --config wrangler.production.toml

name = "cigaratlas-api"
main = "src/index.ts"
compatibility_date = "2026-03-04"
compatibility_flags = ["nodejs_compat"]

# Production D1 Database
[[d1_databases]]
binding = "DB"
database_name = "cigaratlas-db-prod"
database_id = ""  # Fill in after creating the production database

# Production R2 Bucket
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "cigaratlas-images-prod"

[vars]
ENVIRONMENT = "production"